spring:
  application:
    name: microservice-template
  profiles:
    active: @spring.profiles.active@
  main:
    allow-bean-definition-overriding: true
# 注意：已移除 web-application-type: reactive
# 原因：Gateway(WebFlux) 与 Servlet Security(JPA/MVC) 冲突
# 如需 Gateway 功能，应作为独立微服务部署
  cloud:
    config:
      enabled: false
      uri: http://localhost:8888
    discovery:
      enabled: true

server:
  port: 8080
  servlet:
    context-path: /
  error:
    whitelabel:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.template: DEBUG
    org.springframework.cloud: INFO

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: true
    instance:
      prefer-ip-address: true