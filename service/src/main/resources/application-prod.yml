# Production profile configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  forward-headers-strategy: framework

spring:
  application:
    name: microservice-template
  cloud:
    discovery:
      enabled: true
    config:
      enabled: true
      uri: http://config-server:8888
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 6
    loadbalancer:
      retry:
        enabled: true
    circuitbreaker:
      enabled: true
  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME:microservice_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:secret}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
        connection:
          provider_disables_autocommit: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 5000ms
      shutdown-timeout: 200ms
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin}
    connection-timeout: 10000
    virtual-host: /
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${spring.application.name}-group
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 500
      fetch-max-wait: 500
      fetch-min-size: 1
      fetch-max-bytes: 52428800
    producer:
      acks: all
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      compression-type: snappy
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    properties:
      security.protocol: PLAINTEXT
  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false
      use-key-prefix: true
      key-prefix: ${spring.application.name}:

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server1:8761/eureka/,http://eureka-server2:8761/eureka/
    enabled: true
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 30
    eureka-service-url-poll-interval-seconds: 300
  instance:
    prefer-ip-address: true
    instance-id: ${spring.cloud.client.hostname}:${spring.application.name}:${spring.application.instance_id:${server.port}}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      zone: ${ZONE:default}
      version: ${APP_VERSION:1.0.0}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:change-this-to-a-strong-secret-key-with-at-least-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Security Configuration
security:
  api:
    keys: ${API_KEYS:}
  oauth2:
    client:
      registration:
        keycloak:
          client-id: ${OAUTH2_CLIENT_ID}
          client-secret: ${OAUTH2_CLIENT_SECRET}
          authorization-grant-type: authorization_code
          redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          scope: openid,profile,email
      provider:
        keycloak:
          issuer-uri: ${OAUTH2_ISSUER_URI}
          user-name-attribute: preferred_username

# Logging Configuration
logging:
  level:
    com.template: INFO
    org.springframework.cloud: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
    org.apache.kafka: WARN
    org.springframework.amqp: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId:-},%X{spanId:-}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId:-},%X{spanId:-}] - %msg%n"
  file:
    name: /var/log/microservice-template/app.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 3GB
  logback:
    rollingpolicy:
      max-file-size: 100MB
      clean-history-on-start: false
  logstash:
    enabled: false
    host: ${LOGSTASH_HOST:logstash}
    port: ${LOGSTASH_PORT:5000}

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
      base-path: /manage
      path-mapping:
        health: healthcheck
    jmx:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
    loggers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: 1m
    distribution:
      percentiles-histogram:
        http.server.requests: true
        resilience4j.circuitbreaker.calls: true
    tags:
      application: ${spring.application.name}
      environment: prod
      region: ${REGION:unknown}
      zone: ${ZONE:default}
  tracing:
    sampling:
      probability: 0.1
  info:
    env:
      enabled: true
    git:
      mode: full

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      backendService:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 100
        permittedNumberOfCallsInHalfOpenState: 10
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 60s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
        eventConsumerBufferSize: 10
  retry:
    instances:
      backendService:
        maxAttempts: 3
        waitDuration: 1000
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
          - org.springframework.dao.TransientDataAccessException
  bulkhead:
    instances:
      backendService:
        maxConcurrentCalls: 100
        maxWaitDuration: 1000

# Sleuth Configuration
spring.sleuth:
  sampler:
    probability: 0.1
  propagation:
    type: B3
  web:
    enabled: true
    skipPattern: /manage/.*|/swagger.*|/v3/api-docs.*

# Zipkin Configuration
spring.zipkin:
  base-url: ${ZIPKIN_BASE_URL:http://zipkin:9411}
  enabled: ${ZIPKIN_ENABLED:true}
  sender:
    type: web
  service:
    name: ${spring.application.name}

# Rate Limiting
resilience4j.ratelimiter:
  instances:
    apiRateLimiter:
      limit-for-period: 100
      limit-refresh-period: 60s
      timeout-duration: 0s
      register-health-indicator: true

# Micrometer Configuration
management.metrics:
  enable:
    jvm: true
    logback: true
    system: true
    process: true
    tomcat: true
    hikaricp: true
    kafka: true
    rabbitmq: true
    redis: true

# Kafka Streams (optional)
spring.kafka.streams:
  application-id: ${spring.application.name}-streams
  bootstrap-servers: ${spring.kafka.bootstrap-servers}
  properties:
    default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
    default.value.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
    commit.interval.ms: 1000