apiVersion: v1
kind: ConfigMap
metadata:
  name: microservice-config
  namespace: microservices
data:
  application-prod.yml: |
    spring:
      application:
        name: microservice-template
      cloud:
        config:
          enabled: false
        discovery:
          enabled: true
      datasource:
        url: jdbc:postgresql://postgres-service:5432/microservice_db
        driver-class-name: org.postgresql.Driver
      redis:
        host: redis-service
        port: 6379
      rabbitmq:
        host: rabbitmq-service
        port: 5672
      kafka:
        bootstrap-servers: kafka-service:9092
    
    eureka:
      client:
        service-url:
          defaultZone: http://eureka-server:8761/eureka/
        enabled: true
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          show-details: when-authorized
    
    logging:
      level:
        com.example: INFO
        org.springframework: WARN
      file:
        name: /var/log/microservice-template/app.log
    
    resilience4j:
      circuitbreaker:
        instances:
          backendService:
            slidingWindowSize: 100
            minimumNumberOfCalls: 100
            failureRateThreshold: 50
    
    rate:
      limit:
        default: 100
        window:
          seconds: 60
        enabled: true
  
  logback-spring.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration>
        <include resource="org/springframework/boot/logging/logback/defaults.xml"/>
        <include resource="org/springframework/boot/logging/logback/console-appender.xml"/>
        
        <property name="LOG_PATH" value="/var/log/microservice-template"/>
        <property name="LOG_FILE" value="${LOG_PATH}/app.log"/>
        
        <appender name="FILE" class="ch.qos.logback.core.rolling.RollingFileAppender">
            <file>${LOG_FILE}</file>
            <encoder class="ch.qos.logback.classic.encoder.PatternLayoutEncoder">
                <pattern>%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId:-},%X{spanId:-}] - %msg%n</pattern>
            </encoder>
            <rollingPolicy class="ch.qos.logback.core.rolling.TimeBasedRollingPolicy">
                <fileNamePattern>${LOG_PATH}/app.%d{yyyy-MM-dd}.%i.log</fileNamePattern>
                <timeBasedFileNamingAndTriggeringPolicy class="ch.qos.logback.core.rolling.SizeAndTimeBasedFNATP">
                    <maxFileSize>100MB</maxFileSize>
                </timeBasedFileNamingAndTriggeringPolicy>
                <maxHistory>30</maxHistory>
                <totalSizeCap>3GB</totalSizeCap>
            </rollingPolicy>
        </appender>
        
        <appender name="JSON_CONSOLE" class="ch.qos.logback.core.ConsoleAppender">
            <encoder class="net.logstash.logback.encoder.LogstashEncoder">
                <customFields>{"app":"microservice-template","env":"prod"}</customFields>
                <includeContext>true</includeContext>
                <includeMdc>true</includeMdc>
            </encoder>
        </appender>
        
        <root level="INFO">
            <appender-ref ref="CONSOLE"/>
            <appender-ref ref="FILE"/>
        </root>
        
        <logger name="com.example.microservice" level="INFO"/>
        <logger name="org.springframework" level="WARN"/>
        <logger name="org.hibernate" level="WARN"/>
        <logger name="org.apache.kafka" level="WARN"/>
        
        <springProfile name="dev">
            <root level="DEBUG">
                <appender-ref ref="CONSOLE"/>
            </root>
            <logger name="com.example.microservice" level="DEBUG"/>
        </springProfile>
    </configuration>
  
  prometheus-alerts.yml: |
    groups:
    - name: microservice-template
      rules:
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5..", uri!~"/actuator.*"}[5m]) / rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[5m]) * 100 > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          description: "Error rate is {{ $value }}% for {{ $labels.uri }}"
      
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.instance }}"
          description: "95th percentile latency is {{ $value }}s for {{ $labels.uri }}"
      
      - alert: ServiceDown
        expr: up{job="microservice-template"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "Service has been down for more than 1 minute"
      
      - alert: HighMemoryUsage
        expr: (sum(container_memory_working_set_bytes{container="microservice-template"}) by (pod) / sum(container_spec_memory_limit_bytes{container="microservice-template"}) by (pod)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.pod }}"
          description: "Memory usage is {{ $value }}%"
      
      - alert: HighCPUUsage
        expr: (rate(container_cpu_usage_seconds_total{container="microservice-template"}[5m]) / container_spec_cpu_quota{container="microservice-template"} * 100000) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.pod }}"
          description: "CPU usage is {{ $value }}%"