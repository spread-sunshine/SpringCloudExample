# Test profile configuration
spring:
  application:
    name: microservice-template-test
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show_sql: false
        format_sql: false
  flyway:
    enabled: false
  redis:
    host: localhost
    port: ${spring.redis.port:6379}
    timeout: 1000ms
  rabbitmq:
    host: localhost
    port: ${spring.rabbitmq.port:5672}
    username: guest
    password: guest
  kafka:
    bootstrap-servers: localhost:${spring.kafka.port:9092}
  cloud:
    discovery:
      enabled: false
    config:
      enabled: false

server:
  port: 0  # Random port for testing

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.template: DEBUG
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

resilience4j:
  circuitbreaker:
    instances:
      backendService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50

# Test specific properties
test:
  timeout: 30000
  retry:
    max-attempts: 3
    delay: 1000