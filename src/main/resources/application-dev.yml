# Development profile configuration
# 开发环境默认不依赖外部服务（Eureka/Redis/RabbitMQ/Kafka），
# 可独立运行。如需启用某项服务，修改对应配置的 enabled 或 host 即可。
server:
  port: 8080
  servlet:
    context-path: /
  error:
    whitelabel:
      enabled: false
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

spring:
  application:
    name: microservice-template
  cloud:
    discovery:
      enabled: false
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
    open-in-view: false
  flyway:
    enabled: false
  # Redis (可选：RateLimitService 已做优雅降级，Redis 不可用时自动放行)
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 10
        max-idle: 5
        min-idle: 2
        max-wait: -1ms

  # RabbitMQ (开发环境不启用，取消注释并启动 RabbitMQ 后可用)
  # rabbitmq:
  #   host: localhost
  #   port: 5672
  #   username: guest
  #   password: guest
  #   connection-timeout: 10000

  # Kafka (开发环境不启用，取消注释并启动 Kafka 后可用)
  # kafka:
  #   bootstrap-servers: localhost:9092
  #   consumer:
  #     group-id: microservice-group
  #     auto-offset-reset: earliest
  #     enable-auto-commit: false
  #   producer:
  #     key-serializer: org.springframework.kafka.common.serialization.StringSerializer
  #     value-serializer: org.springframework.kafka.common.serialization.StringSerializer

  # 开发环境使用 Caffeine 本地缓存，无需 Redis
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

eureka:
  client:
    enabled: false
    fetch-registry: false
    register-with-eureka: false

jwt:
  secret: your-secret-key-change-in-production-with-at-least-256-bits-longer-key-for-testing
  expiration: 86400000
  refresh-expiration: 604800000

security:
  api:
    keys: "test-api-key-1:ROLE_USER,ROLE_ADMIN:Test Client 1;test-api-key-2:ROLE_USER:Test Client 2"
    validator: "database"
    key:
      expiration:
        days: 90
      warning:
        days: 7
      length: 32
      prefix: "sk_"
  jwt:
    blacklist:
      enabled: true
      cleanup:
        interval-hours: 24
  audit:
    enabled: true
    log-sensitive-operations: true
  headers:
    enabled: true
    hsts:
      max-age: 31536000
      include-subdomains: true
      preload: false
    csp:
      report-only: false
  oauth2:
    client:
      registration:
        github:
          client-id: your-github-client-id
          client-secret: your-github-client-secret
          scope: read:user,user:email

logging:
  level:
    com.template: DEBUG
    org.springframework.cloud: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/microservice-template-dev.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: '*'
      base-path: /manage
    jmx:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    instances:
      backendService:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 60s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  retry:
    instances:
      backendService:
        maxAttempts: 3
        waitDuration: 1000
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
  bulkhead:
    instances:
      backendService:
        maxConcurrentCalls: 25
        maxWaitDuration: 0
  ratelimiter:
    instances:
      apiRateLimiter:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 0s
        register-health-indicator: true

scheduling:
  enabled: true
  cleanup:
    old-audit-logs:
      enabled: true
      cron: "0 0 2 * * ?"
      retention-days: 90
    expired-tokens:
      enabled: true
      cron: "0 0 1 * * ?"
    rate-limit-reset:
      enabled: true
      cron: "0 0 * * * ?"
