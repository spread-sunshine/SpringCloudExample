groups:
  - name: microservice-alerts
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: |
          sum by (application, instance, uri) (
            rate(http_server_requests_seconds_count{status=~"5..", uri!~"/actuator.*"}[5m])
          ) / 
          sum by (application, instance, uri) (
            rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[5m])
          ) * 100 > 5
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          description: "Error rate for {{ $labels.uri }} is {{ $value }}% (application: {{ $labels.application }})"

      # High latency (95th percentile > 1s)
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, 
            sum by (le, application, instance, uri) (
              rate(http_server_requests_seconds_bucket[5m])
            )
          ) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High latency on {{ $labels.instance }}"
          description: "95th percentile latency for {{ $labels.uri }} is {{ $value }}s (application: {{ $labels.application }})"

      # Service down
      - alert: ServiceDown
        expr: up{job="spring-boot"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "Service has been down for more than 1 minute (application: {{ $labels.application }})"

      # High memory usage (> 90%)
      - alert: HighMemoryUsage
        expr: |
          (container_memory_working_set_bytes{container="microservice-template"} / 
           container_spec_memory_limit_bytes{container="microservice-template"}) * 100 > 90
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High memory usage on {{ $labels.pod }}"
          description: "Memory usage is {{ $value }}%"

      # High CPU usage (> 80%)
      - alert: HighCPUUsage
        expr: |
          (rate(container_cpu_usage_seconds_total{container="microservice-template"}[5m]) / 
           container_spec_cpu_quota{container="microservice-template"} * 100000) > 80
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High CPU usage on {{ $labels.pod }}"
          description: "CPU usage is {{ $value }}%"

      # Circuit breaker open
      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="OPEN"} == 1
        for: 1m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Circuit breaker is OPEN for {{ $labels.name }}"
          description: "Circuit breaker has been open for 1 minute"

      # High thread pool utilization (> 80%)
      - alert: HighThreadPoolUtilization
        expr: |
          tomcat_threads_busy_threads / tomcat_threads_config_max_threads * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High thread pool utilization on {{ $labels.instance }}"
          description: "Thread pool utilization is {{ $value }}%"

      # Database connection pool saturation (> 90%)
      - alert: HighDatabaseConnectionPoolUsage
        expr: |
          hikaricp_connections_active / hikaricp_connections_max * 100 > 90
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High database connection pool usage on {{ $labels.pool }}"
          description: "Database connection pool usage is {{ $value }}%"

      # Garbage collection pauses too long (> 500ms)
      - alert: LongGCPauses
        expr: |
          rate(jvm_gc_pause_seconds_sum[5m]) / rate(jvm_gc_pause_seconds_count[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Long GC pauses on {{ $labels.instance }}"
          description: "Average GC pause time is {{ $value }}s"